[advisories]
yanked = "warn"
unmaintained = "all"
unsound = "workspace"

# bincode 1.3.3 is unmaintained (RUSTSEC-2025-0141) but is pulled in transitively
# by gungraun (dev-only). No security impact; no upgrade path exists.
ignore = ["RUSTSEC-2025-0141"]

[bans]
# Warn on duplicate versions of the same crate across the dependency tree.
multiple-versions = "warn"
# Deny wildcard version requirements in workspace member Cargo.toml files.
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

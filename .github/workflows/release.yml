name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - arch: x86_64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - arch: aarch64
            runner: ubuntu-22.04
            rust_target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target.rust_target }}

      - name: Install cross-compilation tools
        if: matrix.target.cross
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Build
        run: cargo build --release --target ${{ matrix.target.rust_target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Rename binary
        run: cp "target/${{ matrix.target.rust_target }}/release/ferrite" "ferrite-linux-${{ matrix.target.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ferrite-linux-${{ matrix.target.arch }}
          path: ferrite-linux-${{ matrix.target.arch }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload to GitHub release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "ferrite-linux-${{ matrix.target.arch }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

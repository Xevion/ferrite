name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without creating a release"
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target.os }} / ${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - os: linux
            arch: aarch64
            runner: ubuntu-22.04
            rust_target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos
            arch: x86_64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
          - os: macos
            arch: aarch64
            runner: macos-latest
            rust_target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target.rust_target }}

      - name: Install cross-compilation tools
        if: matrix.target.cross
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Build
        run: cargo build --release --target ${{ matrix.target.rust_target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target.rust_target }}/release/ferrite"
          DEST="ferrite-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          if [ -f "$SRC.exe" ]; then
            cp "$SRC.exe" "$DEST.exe"
          else
            cp "$SRC" "$DEST"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrite-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: ferrite-${{ matrix.target.os }}-${{ matrix.target.arch }}*
          if-no-files-found: error
          retention-days: 7

      - name: Upload to GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: bash
        run: |
          for f in ferrite-${{ matrix.target.os }}-${{ matrix.target.arch }}*; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

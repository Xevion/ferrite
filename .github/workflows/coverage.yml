name: Coverage

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Override toolchain to nightly
        run: rustup override set nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.5

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.132

      - name: Run tests with coverage
        run: cargo llvm-cov nextest --profile ci --no-fail-fast --hide-progress-bar --failure-output final
        env:
          RUSTFLAGS: --cfg coverage_nightly

      - name: Generate coverage reports
        run: |
          mkdir -p coverage
          cargo llvm-cov report --html --output-dir coverage/html
          cargo llvm-cov report --lcov --output-path coverage/lcov.info
        env:
          RUSTFLAGS: --cfg coverage_nightly

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage/html
          retention-days: 7

      - name: Upload LCOV report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: target/nextest/ci/junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
